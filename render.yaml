services:
  # 1. 백엔드 (Django Docker)
  - type: web
    name: biorag-django
    env: docker
    dockerfilePath: backend/Dockerfile.django
    region: singapore
    plan: free
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NCBI_EMAIL
        sync: false
      - key: NCBI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings

  # 2. 프론트엔드 (Type을 web으로 설정하고 static: true 추가)
  - type: web
    name: biorag-frontend
    env: node
    plan: free
    static: true # 이 설정이 핵심입니다!
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://biorag-django.onrender.com