services:
  # 1. 백엔드 (Django Docker)
  - type: web
    name: biorag-django
    env: docker
    dockerfilePath: backend/Dockerfile.django
    region: singapore
    plan: free
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NCBI_EMAIL
        sync: false
      - key: NCBI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings

  # 2. 프론트엔드 (Node.js Web Service)
  - type: web
    name: biorag-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npm run preview
    staticPublishPath: frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false