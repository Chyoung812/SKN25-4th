services:
  # 1. 백엔드 (Django Docker)
  - type: web
    name: biorag-django
    env: docker
    dockerfilePath: backend/Dockerfile.django
    region: singapore
    plan: free
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NCBI_EMAIL
        sync: false
      - key: NCBI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings

  # 2. 프론트엔드 (Static Site 전용 설정)
  - type: static # 'web' 대신 'static'을 사용해야 publishPath가 인식됩니다.
    name: biorag-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://biorag-django.onrender.com